<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Patchpilot recovery flow</title>
  <desc id="desc">Sentry signals become GitHub issues, Patchpilot diagnoses and dispatches a repair worker, a draft PR is reviewed, and production recovery is verified.</desc>
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; }
      .accent { fill: #22c55e; }
      .accent2 { fill: #38bdf8; }
      .warn { fill: #f59e0b; }
      .text { fill: #f8fafc; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #cbd5e1; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .line { stroke: #64748b; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="520" rx="0" />
  <text class="text" x="70" y="76" font-size="40" font-weight="700">Patchpilot</text>
  <text class="muted" x="70" y="112" font-size="20">Production signals to reviewed, verified recovery PRs</text>

  <rect class="panel" x="70" y="170" width="170" height="150" rx="8" />
  <circle class="warn" cx="108" cy="214" r="14" />
  <text class="text" x="96" y="262" font-size="23" font-weight="700">Sentry</text>
  <text class="muted" x="96" y="292" font-size="16">errors, spans, traces</text>

  <path class="line" d="M245 245 H335" />

  <rect class="panel" x="350" y="170" width="190" height="150" rx="8" />
  <circle class="accent2" cx="390" cy="214" r="14" />
  <text class="text" x="378" y="254" font-size="23" font-weight="700">GitHub Issue</text>
  <text class="muted" x="378" y="284" font-size="16">incident timeline</text>

  <path class="line" d="M545 245 H635" />

  <rect class="panel" x="650" y="150" width="220" height="190" rx="8" />
  <circle class="accent" cx="690" cy="194" r="14" />
  <text class="text" x="678" y="236" font-size="23" font-weight="700">Patchpilot</text>
  <text class="muted" x="678" y="266" font-size="16">diagnose, dedupe</text>
  <text class="muted" x="678" y="292" font-size="16">dispatch, audit</text>

  <path class="line" d="M875 245 H965" />

  <rect class="panel" x="980" y="170" width="170" height="150" rx="8" />
  <circle class="accent2" cx="1018" cy="214" r="14" />
  <text class="text" x="1006" y="254" font-size="23" font-weight="700">Draft PR</text>
  <text class="muted" x="1006" y="284" font-size="16">human review</text>

  <path class="line" d="M1065 325 C1065 405 755 425 755 350" />
  <text class="muted" x="740" y="425" font-size="18">verify with Vercel, health checks, and Sentry quieting</text>
</svg>
